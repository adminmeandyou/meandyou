<div class="flex flex-col">

</div>
</div>
<div class="glass-panel px-4 py-2 rounded-full border border-white/5 flex items-center gap-2">
<div class="w-1.5 h-1.5 bg-primary-container rounded-full animate-pulse"></div>
<span class="font-mono text-sm tracking-widest text-on-surface">02:45</span>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-low/50 text-on-surface hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">more_vert</span>

<div class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest/60 text-on-surface hover:bg-surface-container-highest transition-colors active:scale-95 duration-300">

</div>
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant group-hover:text-on-surface transition-colors">Mudo</span>

<span class="text-[10px] font-bold uppercase tracking-widest text-primary-container">Encerrar</span>
