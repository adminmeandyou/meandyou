<style>
        body {
            background-color: #08090E;
            color: #F8F9FA;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");

        }

            transition-timing-function: cubic-bezier(0.19, 1, 0.22, 1);

    body {

<body class="bg-surface selection:bg-primary-container selection:text-white">
<div class="grain"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#08090E]/70 backdrop-blur-xl no-border tonal-shift bg-gradient-to-b from-[#0F1117] to-transparent">
<div class="flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3 scale-95 active:opacity-80 transition-all cursor-pointer">
<div class="w-8 h-8 rounded-full overflow-hidden border border-white/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a stylish young man in moody low light with soft highlights on his face" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1o3ax9Vlm76ao_majJwyAFgJNL471jK8FoIUut-bAhUAMsFNhzoBRQsAV0NXECyvu6eG0aj0CTtG8BW3C_bnLC0KHR65xEp-t7Df_PbhRzO0jOisrcWiMfdTWjaUcfQ6mzJ81pFdhDqAWmKk9S8cQZbZdlg4C0O8xyaHmC09dBqHoozklJs7_F_nrc83jEL1V8iPt2DxKGP3Wz-gOxXygNUzE77fAaTqFoMWsX30UvjUcrv-PcykJlc0Qd1cDSSsWbA_T3HeGwMCr"/>
</div>
</div>
<h1 class="font-['Fraunces'] font-black tracking-widest text-[#F8F9FA] uppercase tracking-[0.2em] text-lg">
                ME&amp;YOU
            </h1>
<button class="flex items-center justify-center text-[#F8F9FA]/60 hover:text-[#E11D48] transition-colors duration-300 scale-95 active:opacity-80">
<span class="material-symbols-outlined text-2xl" data-icon="loyalty">loyalty</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="min-h-screen pt-16 pb-24 flex flex-col items-center justify-center px-8 relative">
<!-- Abstract Background Element -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-20">
<div class="w-[500px] h-[500px] bg-primary-container/20 blur-[120px] rounded-full"></div>
</div>
<!-- Empty State Container -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center text-center">
<!-- Icon with Glow -->
<div class="relative mb-12 group">
<div class="absolute inset-0 bg-primary-container blur-3xl opacity-20 group-hover:opacity-40 transition-opacity duration-700"></div>
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-surface-container-low border border-white/5">
<span class="material-symbols-outlined text-6xl text-primary-container transition-transform duration-700 ease-out-expo group-hover:scale-110" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-6 mb-12">
<h2 class="editorial-title text-4xl md:text-5xl font-black text-on-surface leading-tight tracking-tight">
                    Você não tem matches ainda
                </h2>
<p class="font-body text-on-surface/60 text-lg leading-relaxed max-w-[300px] mx-auto font-light">
                    Sua jornada para encontrar conexões profundas está apenas começando. Que tal explorar novos horizontes?
                </p>
</div>
<!-- CTA Button -->
<button class="group relative px-10 py-4 bg-gradient-to-r from-[#E11D48] to-[#be123c] rounded-full text-white font-bold tracking-wider text-sm uppercase transition-all duration-500 hover:shadow-[0_4px_25px_rgba(225,29,72,0.4)] hover:scale-105 active:scale-95">
<span class="relative z-10">Ir para Modos</span>
</button>
</div>
<!-- Decorative Quote -->
<div class="absolute bottom-28 left-0 w-full text-center opacity-10 font-['Fraunces'] italic text-xs tracking-[0.4em] uppercase">
            Cura et Amor
        </div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-20 border-t border-white/5 bg-[#0F1117]/80 backdrop-blur-md shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
<div class="fixed bottom-0 w-full flex justify-around items-center px-4 pb-4 h-full">
<a class="flex flex-col items-center justify-center text-[#F8F9FA]/40 hover:text-[#F8F9FA] transition-all ease-out-expo duration-500" href="#">
<span class="material-symbols-outlined" data-icon="style">style</span>
</a>
<!-- Active State: Matches mapped to favorite icon -->
<a class="flex flex-col items-center justify-center text-[#E11D48] scale-110 transition-all ease-out-expo duration-500" href="#">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</a>
<a class="flex flex-col items-center justify-center text-[#F8F9FA]/40 hover:text-[#F8F9FA] transition-all ease-out-expo duration-500" href="#">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
</a>
<a class="flex flex-col items-center justify-center text-[#F8F9FA]/40 hover:text-[#F8F9FA] transition-all ease-out-expo duration-500" href="#">
<span class="material-symbols-outlined" data-icon="Confirmation_Number">confirmation_number</span>
</a>
<a class="flex flex-col items-center justify-center text-[#F8F9FA]/40 hover:text-[#F8F9FA] transition-all ease-out-expo duration-500" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</div>
</nav>
